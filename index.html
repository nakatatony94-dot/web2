<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保守主义思想档案馆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f5f0e8;
    --parchment-dark: #ede6d3;
    --ink: #1a1610;
    --ink-faded: #5c5240;
    --ink-light: #8c7d60;
    --accent: #8b2e00;
    --accent-light: #c4501a;
    --rule: #c8b896;
    --sidebar-bg: #1a1610;
    --sidebar-text: #d4c9a8;
    --sidebar-hover: #f5f0e8;
    --sidebar-muted: #8c7d60;
    --photo-border: #c8b896;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', 'EB Garamond', serif;
    background: var(--parchment);
    color: var(--ink);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  #sidebar-header {
    padding: 28px 20px 18px;
    border-bottom: 1px solid #3a3020;
  }

  #sidebar-header h1 {
    font-family: 'EB Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--sidebar-text);
    letter-spacing: 0.08em;
    line-height: 1.4;
  }

  #sidebar-header p {
    font-size: 11px;
    color: var(--sidebar-muted);
    margin-top: 5px;
    letter-spacing: 0.12em;
    font-family: 'EB Garamond', serif;
    font-style: italic;
  }

  .alpha-group { margin-top: 4px; }

  .alpha-label {
    display: block;
    padding: 10px 20px 4px;
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--sidebar-muted);
    text-transform: uppercase;
  }

  .philosopher-link {
    display: block;
    padding: 6px 20px 6px 28px;
    font-size: 13px;
    color: #b0a080;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .philosopher-link:hover {
    color: var(--sidebar-hover);
    background: rgba(255,255,255,0.04);
    border-left-color: var(--accent);
  }

  .philosopher-link.active {
    color: var(--sidebar-hover);
    border-left-color: var(--accent-light);
    background: rgba(255,255,255,0.06);
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    min-height: 100vh;
    position: relative;
  }

  /* ── HERO ── */
  #hero {
  position: relative;
  width: 100%;
  height: 50vh;
  min-height: 320px;
  overflow: hidden;
  border-bottom: 2px solid var(--rule);
}

#hero-image {
  position: absolute;
  inset: 0;           /* top/right/bottom/left 全部为0，撑满容器 */
  width: 100%;
  height: 100%;
}

#hero-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;  /* 顶部对齐，不裁顶部 */
  display: block;
}

  #hero-image-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #e8dfc8 0%, #d5c9a8 40%, #c8b888 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #hero-image-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(0,0,0,0.03) 39px),
      repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(0,0,0,0.02) 39px);
  }

  #hero-image-placeholder .placeholder-text {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--ink-light);
    letter-spacing: 0.1em;
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 16px 32px;
    border: 1px dashed var(--rule);
  }

  #hero-image-placeholder .placeholder-dims {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 6px;
    letter-spacing: 0.06em;
  }

 #hero-caption {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 10px 40px;
  background: rgba(26, 22, 16, 0.55);
  display: flex;
  align-items: baseline;
  gap: 16px;
  pointer-events: none;
}

#hero-caption .site-name {
  font-family: 'EB Garamond', serif;
  font-size: 26px;
  font-weight: 400;
  color: #f5f0e8;
  letter-spacing: 0.06em;
}

#hero-caption .site-sub {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: #c8b896;
  letter-spacing: 0.1em;
}

#hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 10%, rgba(26, 22, 16, 0.5) 100%);
  pointer-events: none;
}
  /* ── DAILY QUOTE ── */
  #quote-bar {
    padding: 28px 50px 26px;
    border-bottom: 1px solid var(--rule);
    background: var(--parchment-dark);
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
  }

  #quote-bar::before {
    content: '\201C';
    font-family: 'EB Garamond', serif;
    font-size: 72px;
    line-height: 1;
    color: var(--rule);
    position: absolute;
    left: 44px;
    top: 12px;
    pointer-events: none;
    user-select: none;
  }

  #quote-text-wrap {
    flex: 1;
    padding-left: 32px;
  }

  #quote-text {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.8;
    color: var(--ink-faded);
    transition: opacity 0.4s;
    white-space: pre-line;  /* ← 加这一行 */
  }

  #quote-source {
    margin-top: 8px;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    transition: opacity 0.4s;
  }

  #quote-source em {
    font-style: italic;
    color: var(--accent-light);
  }

  #quote-refresh {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-light);
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #quote-refresh:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 680px) {
    #quote-bar { padding: 60px 20px 60px; flex-wrap: wrap; }
    #quote-bar::before { left: 14px; font-size: 52px; }
    #quote-text-wrap { padding-left: 18px; }
    #quote-text { font-size: 15px; }
  }

  /* ── CONTENT AREA ── */
  #content-area {
    padding: 0;
  }

  /* HOME INDEX */
  #home-view {
    padding: 40px 50px 60px;
  }

  #home-view h2 {
    font-family: 'EB Garamond', serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 24px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  .index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0;
  }

  .index-card {
    padding: 18px 16px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .index-card:hover {
    background: var(--parchment-dark);
  }

  .index-card:hover .card-name { color: var(--accent); }

  .card-century {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    transition: color 0.15s;
    line-height: 1.3;
  }

  .card-name-en {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 2px;
    font-style: italic;
  }

  .card-tradition {
    margin-top: 8px;
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border: 1px solid var(--rule);
    color: var(--ink-light);
    font-family: 'EB Garamond', serif;
  }

  /* PHILOSOPHER DETAIL */
  #detail-view {
    display: none;
    padding: 40px 50px 80px;
  }

  #detail-view.visible { display: block; }
  #home-view.hidden { display: none; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    cursor: pointer;
    margin-bottom: 32px;
    transition: color 0.15s;
    background: none;
    border: none;
    padding: 0;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn::before { content: '←'; font-size: 14px; }

  .detail-header {
    display: flex;
    gap: 36px;
    margin-bottom: 36px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--rule);
    align-items: flex-start;
  }

  .detail-photo {
    width: 140px;
    height: 170px;
    flex-shrink: 0;
    border: 1px solid var(--photo-border);
    overflow: hidden;
    background: var(--parchment-dark);
    position: relative;
  }

  .detail-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: sepia(20%);
  }

  .detail-photo .photo-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .detail-photo .photo-placeholder svg {
    opacity: 0.25;
  }

  .detail-photo .photo-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(26,22,16,0.5);
    text-align: center;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 10px;
    color: #c8b896;
    padding: 3px;
  }

  .detail-meta { flex: 1; }

  .detail-meta h2 {
    font-family: 'EB Garamond', serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .detail-meta .name-en {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-light);
    margin-bottom: 12px;
  }

  .meta-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .meta-pill {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    padding: 3px 10px;
    border: 1px solid var(--rule);
    color: var(--ink-faded);
    letter-spacing: 0.06em;
  }

  .detail-meta .bio {
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink-faded);
    font-weight: 300;
  }

  .section-title {
    font-family: 'EB Garamond', serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
  }

  .works-list { margin-bottom: 40px; }
        
  .text-section {
    margin-bottom: 36px;
  }

  .text-block {
    font-size: 14px;
    line-height: 2;
    color: var(--ink-faded);
    white-space: pre-line;
    font-weight: 300;
  }

  .work-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(200,184,150,0.4);
  }

  .work-item:last-child { border-bottom: none; }

  .work-year {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-light);
    width: 40px;
    flex-shrink: 0;
  }

  .work-info { flex: 1; }

  .work-title {
    font-size: 14px;
    color: var(--ink);
    font-style: italic;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
  }

  .work-title-cn {
    font-size: 13px;
    color: var(--ink-faded);
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
    margin-left: 6px;
  }

  .work-note {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 2px;
    font-family: 'EB Garamond', serif;
    font-style: italic;
  }

  .download-btn {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    background: none;
    flex-shrink: 0;
    display: inline-block;
  }

  .download-btn:hover {
    background: var(--accent);
    color: var(--parchment);
  }

  .download-btn.unavailable {
    color: var(--rule);
    border-color: var(--rule);
    cursor: default;
  }
  .download-btn.unavailable:hover {
    background: none;
    color: var(--rule);
  }

  /* ornament */
  .ornament {
    text-align: center;
    color: var(--rule);
    font-size: 18px;
    letter-spacing: 0.4em;
    margin: 24px 0 32px;
    font-family: 'EB Garamond', serif;
  }

  /* ── 关于按钮 ── */
  #about-btn {
    display: block;
    margin: 16px 16px 4px;
    padding: 8px 14px;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--sidebar-text);
    background: none;
    border: 1px solid #3a3020;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    width: calc(100% - 32px);
  }
  #about-btn:hover {
    border-color: var(--accent);
    color: var(--sidebar-hover);
  }
  #about-btn.active {
    border-color: var(--accent-light);
    color: var(--sidebar-hover);
    background: rgba(255,255,255,0.06);
  }

  /* ── 关于页面 ── */
  #about-view {
    display: none;
    padding: 40px 50px 80px;
  }
  #about-view.visible { display: block; }

  .about-hero-img {
    width: 100%;
    height: auto;
    display: block;
    margin-bottom: 32px;
    border: 1px solid var(--rule);
    filter: sepia(15%);
  }

  .about-section {
    margin-bottom: 40px;
  }

  .about-lead {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 20px;
    line-height: 1.8;
    color: var(--ink-faded);
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }

  .about-text {
    font-size: 14px;
    line-height: 2.1;
    color: var(--ink-faded);
    font-weight: 300;
    white-space: pre-line;
  }

  /* scrollbar */
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: #3a3020; }

  @media (max-width: 680px) {
    #sidebar { width: 180px; }
    #home-view, #detail-view { padding: 24px 20px 40px; }
    .detail-header { flex-direction: column; }
    .detail-photo { width: 100%; height: 200px; }
  }
</style>
</head>
<body>

<!-- ══════ SIDEBAR ══════ -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>保守主义思想<br>档案馆</h1>
    <p>Philosophi Archivum</p>
  </div>
  <button id="about-btn" onclick="showAbout()">关于保守主义</button>
  <div id="sidebar-nav"></div>
</nav>

<!-- ══════ MAIN ══════ -->
<div id="main">
  <!-- Hero Banner -->
<div id="hero">
    <div id="hero-image">
        <img src="images/banner.webp" alt="保守主义思想者档案馆" loading="eager">
    </div>
    
    <!-- 可选半透明遮罩，让文字更清晰 -->
    <div id="hero-overlay"></div>
    
    <div id="hero-caption">
        <span class="site-name">保守主义思想者档案馆</span>
        <span class="site-sub">一份私人的保守主义哲学索引</span>
    </div>
</div>

  <!-- ══════ 随机语录 ══════ -->
  <div id="quote-bar">
    <div id="quote-text-wrap">
      <div id="quote-text"></div>
      <div id="quote-source"></div>
    </div>
    <button id="quote-refresh" onclick="showQuote()">换一条</button>
  </div>

  <div id="content-area">
    <!-- HOME -->
    <div id="home-view">
      <h2>全部思想家</h2>
      <div class="index-grid" id="index-grid"></div>
    </div>

    <!-- ABOUT -->
    <div id="about-view">
      <div id="about-content"></div>
    </div>

    <!-- DETAIL -->
    <div id="detail-view">
      <button class="back-btn" onclick="showHome()">返回索引</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<script src="quotes.js"></script>
<script src="philosophers-index.js"></script>
<script src="thinker-detail.js"></script>
<script src="about-conservatism.js"></script>
<script>
// ══════════════════════════════════════════
//  随机语录
// ══════════════════════════════════════════
let lastQuoteIndex = -1;

function showQuote(animate = true) {
  let idx;
  do { idx = Math.floor(Math.random() * quotes.length); }
  while (quotes.length > 1 && idx === lastQuoteIndex);
  lastQuoteIndex = idx;

  const q = quotes[idx];
  const textEl = document.getElementById('quote-text');
  const srcEl  = document.getElementById('quote-source');

  if (animate) {
    textEl.style.opacity = '0';
    srcEl.style.opacity  = '0';
    setTimeout(() => {
      textEl.textContent = q.text;
      srcEl.innerHTML    = q.source
        ? `—— ${q.author}，<em>${q.source}</em>`
        : `—— ${q.author}`;
      textEl.style.opacity = '1';
      srcEl.style.opacity  = '1';
    }, 250);
  } else {
    textEl.textContent = q.text;
    srcEl.innerHTML    = q.source
      ? `—— ${q.author}，<em>${q.source}</em>`
      : `—— ${q.author}`;
  }
}


// ══════════════════════════════════════════
//  构建侧边栏
// ══════════════════════════════════════════
function buildSidebar() {
  const sorted = [...philosophers].sort((a, b) => a.nameEN.localeCompare(b.nameEN));
  const groups = {};
  sorted.forEach(p => {
    const letter = p.nameEN[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(p);
  });

  const nav = document.getElementById('sidebar-nav');
  Object.keys(groups).sort().forEach(letter => {
    const grp = document.createElement('div');
    grp.className = 'alpha-group';
    grp.innerHTML = `<span class="alpha-label">${letter}</span>`;
    groups[letter].forEach(p => {
      const a = document.createElement('a');
      a.className = 'philosopher-link';
      a.dataset.id = p.id;
      a.textContent = p.nameCN;
      a.href = '#';
      a.addEventListener('click', e => { e.preventDefault(); showDetail(p.id); });
      grp.appendChild(a);
    });
    nav.appendChild(grp);
  });
}

// ══════════════════════════════════════════
//  构建首页索引网格
// ══════════════════════════════════════════
function buildGrid() {
  const sorted = [...philosophers].sort((a, b) => a.nameEN.localeCompare(b.nameEN));
  const grid = document.getElementById('index-grid');
  sorted.forEach(p => {
    const card = document.createElement('div');
    card.className = 'index-card';
    card.innerHTML = `
      <div class="card-century">${p.century}</div>
      <div class="card-name">${p.nameCN}</div>
      <div class="card-name-en">${p.nameEN}</div>
      <span class="card-tradition">${p.tradition}</span>
    `;
    card.addEventListener('click', () => showDetail(p.id));
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  显示详情页
// ══════════════════════════════════════════
function showDetail(id) {
  const p = philosophers.find(x => x.id === id);
  if (!p) return;

  document.querySelectorAll('.philosopher-link').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });

  const photoHTML = p.photo
    ? `<img src="${p.photo}" alt="${p.nameCN}肖像"><div class="photo-caption">${p.nameCN}</div>`
    : `<div class="photo-placeholder">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="18" r="10" stroke="#5c5240" stroke-width="1.5"/>
          <path d="M4 44c0-11 8.954-20 20-20s20 9 20 20" stroke="#5c5240" stroke-width="1.5"/>
        </svg>
       </div>
       <div class="photo-caption">肖像待添加</div>`;

  const detail = (typeof thinkerDetail !== 'undefined' && thinkerDetail[p.id]) || {};
  const bioText          = detail.bio          || '资料整理中...';
  const contributionText = detail.contribution || '资料整理中...';

  const worksHTML = p.works.map(w => `
    <div class="work-item">
      <span class="work-year">${w.year}</span>
      <div class="work-info">
        <span class="work-title">${w.titleEN}</span>
        <span class="work-title-cn">／${w.titleCN}</span>
        ${w.note ? `<div class="work-note">${w.note}</div>` : ''}
      </div>
      ${w.file
        ? `<a class="download-btn" href="${w.file}" download>下载</a>`
        : `<span class="download-btn unavailable">待上传</span>`}
    </div>
  `).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-photo">${photoHTML}</div>
      <div class="detail-meta">
        <h2>${p.nameCN}</h2>
        <div class="name-en">${p.nameEN}</div>
        <div class="meta-pills">
          <span class="meta-pill">${p.years}</span>
          <span class="meta-pill">${p.tradition}</span>
          <span class="meta-pill">${p.century}</span>
        </div>
        <p class="bio">${p.bio}</p>
      </div>
    </div>
    <div class="ornament">✦ &nbsp;&nbsp; ✦ &nbsp;&nbsp; ✦</div>

    <div class="text-section">
      <p class="section-title">生平介绍</p>
      <div class="text-block">${bioText}</div>
    </div>

    <div class="text-section">
      <p class="section-title">思想贡献</p>
      <div class="text-block">${contributionText}</div>
    </div>

    <p class="section-title">著作列表</p>
    <div class="works-list">${worksHTML}</div>
  `;

  document.getElementById('about-btn').classList.remove('active');
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('about-view').classList.remove('visible');
  document.getElementById('detail-view').classList.add('visible');
  window.scrollTo({ top: 0 });
}

// ══════════════════════════════════════════
//  关于保守主义
// ══════════════════════════════════════════
function showAbout() {
  const data = (typeof aboutConservatism !== 'undefined') ? aboutConservatism : null;
  if (!data) return;

  // 激活按钮状态
  document.getElementById('about-btn').classList.add('active');
  document.querySelectorAll('.philosopher-link').forEach(a => a.classList.remove('active'));

  // 图片区
  const imgHTML = data.image
    ? `<img class="about-hero-img" src="${data.image}" alt="${data.title}">`
    : '';

  // 正文区（支持多个 sections，每个有 title + text）
  const sectionsHTML = (data.sections || []).map(s => `
    <div class="about-section">
      <p class="section-title">${s.title}</p>
      <div class="about-text">${s.text}</div>
    </div>
  `).join('<div class="ornament">✦ &nbsp;&nbsp; ✦ &nbsp;&nbsp; ✦</div>');

  document.getElementById('about-content').innerHTML = `
    ${imgHTML}
    ${data.lead ? `<div class="about-lead">${data.lead}</div>` : ''}
    ${sectionsHTML}
  `;

  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('about-view').classList.add('visible');
  window.scrollTo({ top: 0 });
}

// ══════════════════════════════════════════
//  返回首页
// ══════════════════════════════════════════
function showHome() {
  document.querySelectorAll('.philosopher-link').forEach(a => a.classList.remove('active'));
  document.getElementById('about-btn').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('about-view').classList.remove('visible');
  window.scrollTo({ top: 0 });
}

// ══════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════
buildSidebar();
buildGrid();
showQuote(false);
</script>
</body>
</html>
